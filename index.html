<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ESPORTS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 25px;
  display: flex;
  justify-content: space-between;
  background: transparent;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 80px;
  font-weight: 900;
  letter-spacing: 5px;
}

/* SECTIONS */
.section {
  padding: 120px 20px;
  text-align: center;
}

.section h2 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* FADE IN ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width: 768px){
  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<nav>
  <div>VOID</div>
  <div>
    <a href="#team">TEAM</a>
    <a href="#matches">MATCHES</a>
    <a href="#contact">CONTACT</a>
  </div>
</nav>

<div class="hero">
  <h1>PLAY DIFFERENT</h1>
</div>

<div id="team" class="section fade">
  <h2>OUR TEAM</h2>
  <p>Elite competitors across multiple titles.</p>
</div>

<div id="matches" class="section fade">
  <h2>NEXT MATCH</h2>
  <p>Coming Soon</p>
</div>

<div id="contact" class="section fade">
  <h2>JOIN US</h2>
  <p>contact@voidesports.com</p>
</div>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(fade => {
    const top = fade.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      fade.classList.add('show');
    }
  });
});
</script>

</body>
</html>
